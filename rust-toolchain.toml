# Fjord is a bare-metal, no_std Rust OS. It pins a nightly toolchain because
# build-std and several unstable features are required for kernel-space crates.
[toolchain]
channel = "nightly-2026-06-01"
components = ["rust-src", "rustfmt", "clippy", "llvm-tools-preview"]
targets = ["x86_64-unknown-none", "aarch64-unknown-none"]
